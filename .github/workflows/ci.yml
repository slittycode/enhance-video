name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev,validation,telemetry]"

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
